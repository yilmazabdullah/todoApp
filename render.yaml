services:
  - type: web
    name: todo-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: todo-db
    databaseName: todoapp
